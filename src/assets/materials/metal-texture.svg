      <stop offset="0%" stop-color="#cdd2d8"/>
      <stop offset="50%" stop-color="#8f98a2"/>
      <stop offset="100%" stop-color="#6a737c"/>
    </linearGradient>
    <pattern id="brush" width="6" height="6" patternUnits="userSpaceOnUse">
      <rect width="6" height="6" fill="transparent"/>
      <path d="M0 1H6" stroke="#ffffff" stroke-width="0.8" opacity="0.12"/>
      <path d="M0 4H6" stroke="#1e252c" stroke-width="0.8" opacity="0.1"/>
