<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Woven textile texture">
  <defs>
    <linearGradient id="fabricBase" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e7dfd2"/>
      <stop offset="55%" stop-color="#cdc2b4"/>
      <stop offset="100%" stop-color="#b2a697"/>
    </linearGradient>
    <pattern id="weave" width="18" height="18" patternUnits="userSpaceOnUse">
      <rect width="18" height="18" fill="transparent"/>
      <path d="M0 4H18" stroke="#f8f3ea" stroke-width="2" opacity="0.45"/>
      <path d="M0 13H18" stroke="#8d8174" stroke-width="2" opacity="0.35"/>
      <path d="M4 0V18" stroke="#f5efe4" stroke-width="2" opacity="0.4"/>
      <path d="M13 0V18" stroke="#8c8073" stroke-width="2" opacity="0.3"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#fabricBase)"/>
  <rect width="1600" height="1000" fill="url(#weave)"/>
  <g fill="#fff8eb" opacity="0.18">
    <circle cx="280" cy="240" r="130"/>
    <circle cx="1320" cy="760" r="180"/>
    <circle cx="990" cy="240" r="110"/>
  </g>
</svg>
