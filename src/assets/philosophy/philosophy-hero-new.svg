<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Philosophy abstract architectural composition">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f1ece4"/>
      <stop offset="50%" stop-color="#ddd3c6"/>
      <stop offset="100%" stop-color="#c6b7a6"/>
    </linearGradient>
    <linearGradient id="slabA" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#90806f"/>
      <stop offset="100%" stop-color="#655847"/>
    </linearGradient>
    <linearGradient id="slabB" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e8dfd3"/>
      <stop offset="100%" stop-color="#b8ab9a"/>
    </linearGradient>
    <filter id="grain" x="-20%" y="-20%" width="140%" height="140%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" stitchTiles="stitch"/>
      <feColorMatrix type="saturate" values="0.2"/>
      <feComponentTransfer>
        <feFuncA type="table" tableValues="0 0.12"/>
      </feComponentTransfer>
    </filter>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect x="0" y="720" width="1600" height="280" fill="#b9a992"/>

  <g fill="url(#slabB)">
    <rect x="130" y="170" width="290" height="560"/>
    <rect x="470" y="220" width="210" height="510"/>
    <rect x="730" y="145" width="310" height="585"/>
    <rect x="1090" y="260" width="220" height="470"/>
  </g>

  <g fill="url(#slabA)">
    <rect x="210" y="340" width="95" height="390"/>
    <rect x="550" y="300" width="70" height="430"/>
    <rect x="845" y="245" width="85" height="485"/>
    <rect x="1170" y="360" width="78" height="370"/>
  </g>

  <g fill="#f6efe5" opacity="0.42">
    <rect x="150" y="190" width="250" height="20"/>
    <rect x="760" y="165" width="250" height="20"/>
    <rect x="1115" y="280" width="170" height="18"/>
  </g>

  <g fill="none" stroke="#4a4036" stroke-width="7" opacity="0.35">
    <path d="M80 690C300 620 470 740 700 690S1100 620 1510 705"/>
    <path d="M120 760C330 720 510 810 735 770S1110 705 1490 780"/>
  </g>

  <rect width="1600" height="1000" fill="#3c3329" filter="url(#grain)"/>
</svg>
